# Render infra-as-code. Connect this repo in the Render dashboard ("New +" → "Blueprint").
databases:
  - name: cpq-db
    plan: free
    databaseName: cpq
    user: cpq

services:
  - type: web
    name: cpq-app
    runtime: node
    plan: free
    # --include=dev keeps tsx/prisma/vite (devDependencies) available for build AND
    # the runtime start command, even though Render sets NODE_ENV=production.
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cpq-db
          property: connectionString
      - key: NODE_VERSION
        value: "20"
