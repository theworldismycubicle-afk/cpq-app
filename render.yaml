# Render infra-as-code. Connect this repo in the Render dashboard ("New +" → "Blueprint").
databases:
  - name: cpq-db
    plan: free
    databaseName: cpq
    user: cpq

services:
  - type: web
    name: cpq-app
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cpq-db
          property: connectionString
      - key: NODE_VERSION
        value: "20"
